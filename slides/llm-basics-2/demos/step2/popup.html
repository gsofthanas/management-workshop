<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ササッと読む</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 440px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e8edf3 100%);
    color: #1d1d1f;
  }
  .container {
    padding: 20px;
  }
  .header {
    margin-bottom: 16px;
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #6e6e73;
    font-size: 12px;
    font-weight: 500;
  }
  .extract-btn {
    width: 100%;
    padding: 14px;
    background: #15803D;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 12px;
    transition: background 0.15s, transform 0.05s;
  }
  .extract-btn:hover { background: #126e35; }
  .extract-btn:active { transform: scale(0.98); }
  .extract-btn:disabled { background: #a1a1a6; cursor: not-allowed; }
  .divider {
    text-align: center;
    color: #a1a1a6;
    font-size: 11px;
    font-weight: 600;
    margin: 8px 0 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  textarea {
    width: 100%;
    min-height: 140px;
    padding: 14px;
    border: 2px solid #e5e5e7;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    font-family: inherit;
    color: #1d1d1f;
    resize: vertical;
    background: white;
  }
  textarea:focus {
    outline: none;
    border-color: #0078D4;
    box-shadow: 0 0 0 4px rgba(0, 120, 212, 0.12);
  }
  textarea::placeholder { color: #a1a1a6; }
  .actions {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  button {
    padding: 12px 18px;
    background: #0078D4;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    font-family: inherit;
  }
  button:hover { background: #006abe; }
  button:active { transform: scale(0.98); }
  #analyze { flex: 1; }
  button.secondary {
    background: #f5f5f7;
    color: #1d1d1f;
  }
  button.secondary:hover { background: #ebebed; }
  .source-info {
    margin-top: 12px;
    font-size: 11px;
    color: #6e6e73;
    padding: 8px 12px;
    background: #f5f7fa;
    border-radius: 8px;
    border-left: 3px solid #15803D;
    display: none;
  }
  .source-info.show { display: block; }
  .source-info strong { color: #15803D; }
  .results {
    margin-top: 16px;
    display: none;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    animation: fadeIn 0.3s ease-out;
  }
  .results.show { display: grid; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-card {
    background: linear-gradient(135deg, #f5f7fa 0%, #ebeef3 100%);
    padding: 14px 8px;
    border-radius: 12px;
    text-align: center;
    border: 1px solid rgba(0, 0, 0, 0.04);
  }
  .result-icon {
    font-size: 18px;
    margin-bottom: 4px;
  }
  .result-label {
    font-size: 9px;
    color: #6e6e73;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .result-value {
    font-size: 20px;
    font-weight: 800;
    color: #1d1d1f;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .result-unit {
    font-size: 11px;
    color: #6e6e73;
    margin-left: 1px;
    font-weight: 600;
  }
  .keywords {
    margin-top: 12px;
    display: none;
    animation: fadeIn 0.3s ease-out;
  }
  .keywords.show { display: block; }
  .keywords-section {
    background: #f5f7fa;
    border: 1px solid rgba(0, 0, 0, 0.04);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
  }
  .keywords-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .keywords-title {
    font-size: 10px;
    color: #6e6e73;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
  }
  .keywords-count {
    font-size: 10px;
    color: #a1a1a6;
    font-weight: 600;
  }
  .keywords-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    max-height: 100px;
    overflow-y: auto;
  }
  .keyword-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    background: white;
    border: 1px solid #e5e5e7;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    color: #1d1d1f;
  }
  .keyword-tag.en { color: #0078D4; border-color: #c7e0f4; }
  .keyword-tag.kana { color: #15803D; border-color: #c8e6d3; }
  .keyword-count {
    font-size: 9px;
    color: #a1a1a6;
    font-weight: 700;
    background: #f5f5f7;
    padding: 1px 5px;
    border-radius: 100px;
  }
  .keywords-empty {
    font-size: 12px;
    color: #a1a1a6;
    font-style: italic;
  }
  .footer {
    margin-top: 16px;
    text-align: center;
    font-size: 10px;
    color: #a1a1a6;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📖 ササッと読む</h1>
      <p class="subtitle">記事をサクッと解析しよう</p>
    </div>

    <button id="extract" class="extract-btn">📥 このページから取得</button>

    <div class="divider">— or —</div>

    <textarea id="input" placeholder="ここに記事を貼り付けてください..."></textarea>

    <div class="actions">
      <button id="analyze">解析する</button>
      <button id="clear" class="secondary">クリア</button>
    </div>

    <div class="source-info" id="sourceInfo"></div>

    <div class="results" id="results">
      <div class="result-card">
        <div class="result-icon">📊</div>
        <div class="result-label">文字数</div>
        <div class="result-value"><span id="chars">0</span><span class="result-unit">字</span></div>
      </div>
      <div class="result-card">
        <div class="result-icon">⏱</div>
        <div class="result-label">読了時間</div>
        <div class="result-value">約<span id="time">0</span><span class="result-unit">分</span></div>
      </div>
      <div class="result-card">
        <div class="result-icon">📑</div>
        <div class="result-label">段落数</div>
        <div class="result-value"><span id="paragraphs">0</span></div>
      </div>
    </div>

    <div class="keywords" id="keywords">
      <div class="keywords-section">
        <div class="keywords-header">
          <div class="keywords-title">🔤 英単語</div>
          <div class="keywords-count" id="enCount">0 件</div>
        </div>
        <div class="keywords-list" id="enList"></div>
      </div>
      <div class="keywords-section">
        <div class="keywords-header">
          <div class="keywords-title">🇯🇵 カタカナ語</div>
          <div class="keywords-count" id="kanaCount">0 件</div>
        </div>
        <div class="keywords-list" id="kanaList"></div>
      </div>
    </div>

    <div class="footer">Step 2 / Chrome Extension — ササッと読む</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
